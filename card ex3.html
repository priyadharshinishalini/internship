 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card with Image and Button</title>
  <style>
    .card {
      border: 1px solid #ccc;
      padding: 15px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      text-align: center;
      background-color: #fff;
    }
    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }
    .card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .card h3 {
      margin: 10px 0;
      color: darkblue;
    }
    .card p {
      color: #555;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .card button {
      background-color: darkblue;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .card button:hover {
      background-color: navy;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/sun.jpg" alt="Sample Image">
    <h3>Travel Card</h3>
    <p>Discover amazing destinations and plan your next adventure.</p>
    <button>Explore</button>
  </div>
</body>
</html>
