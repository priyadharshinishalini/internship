<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Menu Example</title>
  <style>
    body {
      background: rgb(133, 219, 111); /* default background */
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    .dropdown {
      position: relative;
      display: inline-block;
      background-color: rgb(139, 79, 0);
      color: white;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }
    .menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      min-width: 120px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      z-index: 1;
    }
    .menu p {
      margin: 0;
      padding: 10px;
      cursor: pointer;
      color: #333;
    }
    .menu p:hover {
      background-color: lightgray;
    }
    .dropdown:hover .menu {
      display: block;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center; color:rgb(139, 0, 0); margin-top:20px;">
    Dropdown Menu
  </h2>
  <div class="dropdown">
    Menu
    <div class="menu">
      <p>Item 1</p>
      <p>Item 2</p>
      <p>Item 3</p>
    </div>
  </div>
</body>
</html>
