<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Skills</title>
</head>
<style>
    body {
        margin: 10px;
        background: rgb(247, 194, 137);
        text-align: center;
        padding: 50px 20px;
        border-radius: 720px;
        font-weight: bold;
    }
    h1 {
        color: #bb6808;
        font-size: 50px;
        margin: 15px;
    }
    .subtitle {
        color: #6c3b03f0;
        margin-bottom: 40px;
    }
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }
    .card {
        background: #fadcb6f4;
        color: rgb(98, 53, 8);
        padding: 25px;
        border-radius: 4ch;
        text-align: left;
    }
    .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }
    .tags span {
        background: #f5f4f0;
        padding: 8px 14px;
        border-radius: 20px;
        font-size: 14px;
    }
</style>
</head>
<body>
    <button style="text-align:center; color:rgb(246, 50, 50); font-size:15px; border-radius:1ch; border:white;">Skills &
        Expertise</button>
    <h2 style="text-align:center; color:rgb(122, 3, 3); font-size:40px;">Technical Skills</h2>
    <p style="text-align:center; color:rgb(88, 6, 6); font-size:30px;">Technologies and tools I use to design and
        develop modern web solutions</p>
    <div class="container">
        <div class="card">
            <h3 style="color:rgb(93, 36, 3);">Frontend</h3>
            <div class="tags" style="color:rgb(48, 23, 28);">
                <span>HTML</span>
                <span>CSS</span>
                <span>JavaScript</span>
                <span>Bootstrap</span>
            </div>
        </div>
        <div class="card">
            <h3 style="color:rgb(93, 36, 3);">Backend / CMS</h3>
            <div class="tags" style="color:rgb(48, 23, 28);">
                <span>WordPress</span>
                <span>PHP (Basic)</span>
                <span>MySQL</span>
            </div>
        </div>
        <div class="card">
            <h3 style="color:rgb(93, 36, 3);">Design Tools</h3>
            <div class="tags" style="color:rgb(48, 23, 28);">
                <span>Adobe Photoshop</span>
                <span>Canva</span>
                <span>Figma</span>
            </div>
        </div>
        <div class="card">
            <h3 style="color:rgb(93, 36, 3);">Dev Tools</h3>
            <div class="tags" style="color:rgb(48, 23, 28);">
                <span>VPS Server</span>
                <span>GitHub</span>
            </div>
        </div>
</body>
</html>
