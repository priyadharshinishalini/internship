<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>External CSS Example</title>
  <!-- Linking external CSS file -->
  <link rel="stylesheet" href="mystyle.css">
</head>
<style>
    body {
      background: rgb(153, 186, 99); /* default background */
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
</style>
<body>
  <h1 style="color:rgb(91, 39, 1);font-size:32px; text-align:center;">External CSS</h1>
  <p style="color:rgb(147, 44, 10); font-size:26px;">Think of *External CSS* as a "Universal Design Blueprint"; you keep your styles in a separate, independent file that acts as a master guide for your entire website, ensuring consistency and easy updates across every single page with just one click.</p>
</body>
</html>
